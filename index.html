title: 안녕

<ul class="PostList">
{% assign posts = site.posts | sort: date | reverse %}
{% for post in posts %}
  <li class="item">
    <a href="{{ post.url }}" class="title">{{ post.title }}</a>
    <a href="/categories#{{ post.category | slugify }}" class="right Category">
      {{ post.category }}
    </a>
  </li>
{% endfor %}
</ul>
